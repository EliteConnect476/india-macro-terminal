name: Update Macro Data

on:
  schedule:
    - cron: '30 3 * * *'   # runs daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:        # lets you also trigger it manually from GitHub's website

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect market data
        run: python scripts/collect_market_data.py

      - name: Collect RBI policy rates
        run: python scripts/collect_rbi_rates.py

      - name: Collect data.gov.in indicators
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: python scripts/collect_data_gov.py

      - name: Save any new data back to the repository
        run: |
          git config user.name "macro-terminal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u +%Y-%m-%d)"
          git push
